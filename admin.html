<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel | Zubair SEO Blog</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * { font-family: 'Inter', sans-serif; }
        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --accent: #22d3ee;
            --dark: #0f172a;
            --darker: #020617;
        }
        body { background: var(--darker); }
        .gradient-text {
            background: linear-gradient(135deg, var(--primary), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .glass {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .btn-primary {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            transition: all 0.3s ease;
        }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 10px 30px rgba(99, 102, 241, 0.4); }
        .btn-danger {
            background: linear-gradient(135deg, #ef4444, #dc2626);
            transition: all 0.3s ease;
        }
        .btn-danger:hover { transform: translateY(-2px); box-shadow: 0 10px 30px rgba(239, 68, 68, 0.4); }
        .sidebar-item {
            transition: all 0.2s ease;
            cursor: pointer;
        }
        .sidebar-item:hover, .sidebar-item.active {
            background: rgba(99, 102, 241, 0.2);
            color: white;
        }
        .sidebar-item.active { border-right: 3px solid var(--primary); }
        input, textarea, select {
            background: rgba(255, 255, 255, 0.05) !important;
            border: 1px solid rgba(255, 255, 255, 0.1) !important;
            color: white !important;
            outline: none;
        }
        input:focus, textarea:focus, select:focus {
            border-color: var(--primary) !important;
            box-shadow: 0 0 0 2px rgba(99, 102, 241, 0.2) !important;
        }
        input::placeholder, textarea::placeholder { color: #64748b !important; }
        .tag-input { display: flex; flex-wrap: wrap; gap: 6px; padding: 8px; min-height: 44px; }
        .tag-badge {
            background: rgba(99, 102, 241, 0.3);
            color: #a5b4fc;
            padding: 2px 10px;
            border-radius: 9999px;
            font-size: 0.8rem;
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .tag-badge button { color: #f87171; font-weight: bold; }
        .loader { border: 3px solid rgba(255,255,255,0.1); border-top: 3px solid #6366f1; border-radius: 50%; width: 30px; height: 30px; animation: spin 0.8s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .post-row { transition: background 0.2s; }
        .post-row:hover { background: rgba(255,255,255,0.03); }
        .stat-card { transition: transform 0.2s; }
        .stat-card:hover { transform: translateY(-2px); }
        .toast {
            position: fixed; bottom: 30px; right: 30px; padding: 14px 24px;
            border-radius: 12px; color: white; font-weight: 600;
            z-index: 9999; animation: slideIn 0.3s ease, fadeOut 0.3s ease 2.7s;
        }
        @keyframes slideIn { from { transform: translateX(100px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        @keyframes fadeOut { from { opacity: 1; } to { opacity: 0; } }
    </style>
</head>
<body class="min-h-screen">

    <!-- Login Screen -->
    <div id="login-screen" class="min-h-screen flex items-center justify-center">
        <div class="glass rounded-3xl p-8 w-full max-w-md mx-4">
            <div class="text-center mb-8">
                <h1 class="text-3xl font-black mb-2"><span class="gradient-text">Admin</span><span class="text-white">Panel</span></h1>
                <p class="text-gray-400">Login to manage your blog</p>
            </div>
            <div id="login-error" class="hidden bg-red-500/20 text-red-400 p-3 rounded-xl mb-4 text-sm text-center"></div>
            <div class="space-y-4">
                <div>
                    <label class="text-gray-400 text-sm mb-1 block">Email</label>
                    <input id="login-email" type="email" placeholder="admin@example.com" class="w-full px-4 py-3 rounded-xl">
                </div>
                <div>
                    <label class="text-gray-400 text-sm mb-1 block">Password</label>
                    <input id="login-password" type="password" placeholder="••••••••" class="w-full px-4 py-3 rounded-xl">
                </div>
                <button onclick="login()" class="btn-primary w-full py-3 rounded-xl text-white font-semibold text-lg">Login</button>
            </div>
            <p class="text-gray-500 text-xs text-center mt-4">Forgot password? Reset from Firebase Console</p>
        </div>
    </div>

    <!-- Admin Dashboard -->
    <div id="admin-screen" class="hidden min-h-screen flex">
        <!-- Sidebar -->
        <aside class="w-64 bg-black/40 border-r border-white/10 p-6 flex flex-col fixed h-full">
            <div class="mb-8">
                <h1 class="text-xl font-black"><span class="gradient-text">Admin</span><span class="text-white">Panel</span></h1>
            </div>
            <nav class="flex-1 space-y-1">
                <div class="sidebar-item active rounded-xl px-4 py-3 text-gray-300 flex items-center gap-3" onclick="switchTab('dashboard')" data-tab="dashboard">
                    <i data-lucide="layout-dashboard" class="w-5 h-5"></i> Dashboard
                </div>
                <div class="sidebar-item rounded-xl px-4 py-3 text-gray-300 flex items-center gap-3" onclick="switchTab('posts')" data-tab="posts">
                    <i data-lucide="file-text" class="w-5 h-5"></i> Posts
                </div>
                <div class="sidebar-item rounded-xl px-4 py-3 text-gray-300 flex items-center gap-3" onclick="switchTab('new-post')" data-tab="new-post">
                    <i data-lucide="plus-circle" class="w-5 h-5"></i> New Post
                </div>
            </nav>
            <div class="border-t border-white/10 pt-4 space-y-2">
                <a href="blog.html" class="flex items-center gap-3 text-gray-400 hover:text-white px-4 py-2 rounded-xl transition-colors">
                    <i data-lucide="external-link" class="w-5 h-5"></i> View Blog
                </a>
                <button onclick="logout()" class="flex items-center gap-3 text-red-400 hover:text-red-300 px-4 py-2 rounded-xl transition-colors w-full">
                    <i data-lucide="log-out" class="w-5 h-5"></i> Logout
                </button>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="flex-1 ml-64 p-8">
            <!-- Dashboard Tab -->
            <div id="tab-dashboard" class="tab-content">
                <h2 class="text-3xl font-black text-white mb-6">Dashboard</h2>
                <div class="grid md:grid-cols-3 gap-6 mb-8">
                    <div class="stat-card glass rounded-2xl p-6">
                        <div class="text-gray-400 text-sm mb-1">Total Posts</div>
                        <div id="stat-posts" class="text-4xl font-black text-white">0</div>
                    </div>
                    <div class="stat-card glass rounded-2xl p-6">
                        <div class="text-gray-400 text-sm mb-1">Latest Post</div>
                        <div id="stat-latest" class="text-lg font-bold text-white">—</div>
                    </div>
                    <div class="stat-card glass rounded-2xl p-6">
                        <div class="text-gray-400 text-sm mb-1">Status</div>
                        <div class="text-lg font-bold text-green-400 flex items-center gap-2">
                            <i data-lucide="check-circle" class="w-5 h-5"></i> Active
                        </div>
                    </div>
                </div>
                <div class="glass rounded-2xl p-6">
                    <h3 class="text-xl font-bold text-white mb-4">Recent Posts</h3>
                    <div id="dashboard-recent" class="space-y-3"><div class="flex justify-center py-8"><div class="loader"></div></div></div>
                </div>
            </div>

            <!-- Posts Tab -->
            <div id="tab-posts" class="tab-content hidden">
                <div class="flex items-center justify-between mb-6">
                    <h2 class="text-3xl font-black text-white">All Posts</h2>
                    <button onclick="switchTab('new-post')" class="btn-primary px-6 py-2 rounded-xl text-white font-semibold flex items-center gap-2">
                        <i data-lucide="plus" class="w-4 h-4"></i> New Post
                    </button>
                </div>
                <div class="glass rounded-2xl overflow-hidden">
                    <table class="w-full">
                        <thead>
                            <tr class="border-b border-white/10">
                                <th class="text-left text-gray-400 font-semibold text-sm px-6 py-4">Title</th>
                                <th class="text-left text-gray-400 font-semibold text-sm px-6 py-4">Tags</th>
                                <th class="text-left text-gray-400 font-semibold text-sm px-6 py-4">Date</th>
                                <th class="text-right text-gray-400 font-semibold text-sm px-6 py-4">Actions</th>
                            </tr>
                        </thead>
                        <tbody id="posts-table">
                            <tr><td colspan="4" class="text-center py-8"><div class="loader mx-auto"></div></td></tr>
                        </tbody>
                    </table>
                </div>
            </div>

            <!-- New/Edit Post Tab -->
            <div id="tab-new-post" class="tab-content hidden">
                <h2 id="form-title" class="text-3xl font-black text-white mb-6">New Post</h2>
                <div class="glass rounded-2xl p-8 max-w-3xl">
                    <input type="hidden" id="edit-post-id" value="">
                    <div class="space-y-5">
                        <div>
                            <label class="text-gray-400 text-sm mb-1 block">Post Title *</label>
                            <input id="post-title" type="text" placeholder="Enter post title..." class="w-full px-4 py-3 rounded-xl">
                        </div>
                        <div>
                            <label class="text-gray-400 text-sm mb-1 block">Image URL</label>
                            <input id="post-image" type="text" placeholder="https://example.com/image.jpg" class="w-full px-4 py-3 rounded-xl">
                            <p class="text-gray-500 text-xs mt-1">Leave empty for default image</p>
                        </div>
                        <div>
                            <label class="text-gray-400 text-sm mb-1 block">Author</label>
                            <input id="post-author" type="text" placeholder="Zubair Ahmed" value="Zubair Ahmed" class="w-full px-4 py-3 rounded-xl">
                        </div>
                        <div>
                            <label class="text-gray-400 text-sm mb-1 block">Tags</label>
                            <div class="flex gap-2">
                                <input id="tag-input" type="text" placeholder="Add tag and press Enter" class="flex-1 px-4 py-3 rounded-xl" onkeydown="handleTagKey(event)">
                                <button onclick="addTag()" class="btn-primary px-4 py-3 rounded-xl text-white font-semibold">Add</button>
                            </div>
                            <div id="tags-container" class="tag-input mt-2 rounded-xl"></div>
                        </div>
                        <div>
                            <label class="text-gray-400 text-sm mb-1 block">Content * <span class="text-gray-500">(HTML supported)</span></label>
                            <textarea id="post-content" rows="12" placeholder="Write your blog post content here...&#10;&#10;You can use HTML tags like <h2>, <p>, <ul>, <li>, <strong>, <em> etc." class="w-full px-4 py-3 rounded-xl resize-y"></textarea>
                        </div>
                        <div class="flex gap-3">
                            <button onclick="savePost()" class="btn-primary px-8 py-3 rounded-xl text-white font-semibold flex items-center gap-2">
                                <i data-lucide="save" class="w-5 h-5"></i> <span id="save-btn-text">Publish Post</span>
                            </button>
                            <button onclick="switchTab('posts')" class="px-6 py-3 rounded-xl text-gray-400 hover:text-white border border-white/10 hover:border-white/20 transition-colors">Cancel</button>
                        </div>
                    </div>
                    <div id="form-message" class="hidden mt-4 p-3 rounded-xl text-sm text-center"></div>
                </div>
            </div>
        </main>
    </div>

    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDHGc46nkZiofW5HWpufcm-utfaFvKuM8A",
            authDomain: "zubair-seo-blog.firebaseapp.com",
            projectId: "zubair-seo-blog",
            storageBucket: "zubair-seo-blog.firebasestorage.app",
            messagingSenderId: "316167611434",
            appId: "1:316167611434:web:676703d587583abc24cf53",
            measurementId: "G-V8T805VJ57"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();

        let currentTags = [];
        let allPosts = [];

        // Auth
        function login() {
            const email = document.getElementById('login-email').value;
            const password = document.getElementById('login-password').value;
            const errorEl = document.getElementById('login-error');
            if (!email || !password) {
                errorEl.textContent = 'Please enter email and password';
                errorEl.classList.remove('hidden');
                return;
            }
            auth.signInWithEmailAndPassword(email, password)
                .then(() => { errorEl.classList.add('hidden'); showAdmin(); })
                .catch(err => {
                    errorEl.textContent = err.message;
                    errorEl.classList.remove('hidden');
                });
        }

        function logout() {
            auth.signOut();
            document.getElementById('admin-screen').classList.add('hidden');
            document.getElementById('login-screen').classList.remove('hidden');
            document.getElementById('login-email').value = '';
            document.getElementById('login-password').value = '';
        }

        auth.onAuthStateChanged(user => {
            if (user) showAdmin();
        });

        // Enter key login
        document.getElementById('login-password').addEventListener('keydown', e => { if (e.key === 'Enter') login(); });
        document.getElementById('login-email').addEventListener('keydown', e => { if (e.key === 'Enter') login(); });

        function showAdmin() {
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('admin-screen').classList.remove('hidden');
            loadAllPosts();
            lucide.createIcons();
        }

        // Tabs
        function switchTab(tab) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.add('hidden'));
            document.getElementById('tab-' + tab).classList.remove('hidden');
            document.querySelectorAll('.sidebar-item').forEach(s => s.classList.remove('active'));
            document.querySelector(`.sidebar-item[data-tab="${tab}"]`)?.classList.add('active');
            if (tab === 'posts') loadPostsTable();
            if (tab === 'new-post') { resetForm(); lucide.createIcons(); }
            if (tab === 'dashboard') updateDashboard();
        }

        // Tags
        function handleTagKey(e) { if (e.key === 'Enter') { e.preventDefault(); addTag(); } }
        function addTag() {
            const input = document.getElementById('tag-input');
            const tag = input.value.trim();
            if (tag && !currentTags.includes(tag)) {
                currentTags.push(tag);
                renderTags();
            }
            input.value = '';
        }
        function removeTag(index) { currentTags.splice(index, 1); renderTags(); }
        function renderTags() {
            document.getElementById('tags-container').innerHTML = currentTags.map((t, i) =>
                `<span class="tag-badge">${t} <button onclick="removeTag(${i})">&times;</button></span>`
            ).join('');
        }

        // Load Posts
        async function loadAllPosts() {
            try {
                const snapshot = await db.collection('posts').orderBy('createdAt', 'desc').get();
                allPosts = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                updateDashboard();
            } catch (err) { console.error(err); }
        }

        function updateDashboard() {
            document.getElementById('stat-posts').textContent = allPosts.length;
            document.getElementById('stat-latest').textContent = allPosts.length > 0 ? allPosts[0].title : '—';
            const recentEl = document.getElementById('dashboard-recent');
            if (allPosts.length === 0) {
                recentEl.innerHTML = '<p class="text-gray-500 text-center py-4">No posts yet</p>';
            } else {
                recentEl.innerHTML = allPosts.slice(0, 5).map(p => {
                    const date = p.createdAt ? new Date(p.createdAt.seconds * 1000).toLocaleDateString() : '—';
                    return `<div class="flex items-center justify-between py-2 px-3 rounded-xl hover:bg-white/5"><div class="text-white font-medium">${p.title}</div><div class="text-gray-500 text-sm">${date}</div></div>`;
                }).join('');
            }
        }

        async function loadPostsTable() {
            const tbody = document.getElementById('posts-table');
            try {
                const snapshot = await db.collection('posts').orderBy('createdAt', 'desc').get();
                if (snapshot.empty) {
                    tbody.innerHTML = '<tr><td colspan="4" class="text-center text-gray-500 py-8">No posts yet. Create your first post!</td></tr>';
                    return;
                }
                tbody.innerHTML = '';
                snapshot.forEach(doc => {
                    const p = doc.data();
                    const date = p.createdAt ? new Date(p.createdAt.seconds * 1000).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' }) : '—';
                    const tags = (p.tags || []).map(t => `<span style="background:rgba(99,102,241,0.2);color:#a5b4fc;padding:2px 8px;border-radius:9999px;font-size:0.7rem;">${t}</span>`).join(' ');
                    tbody.innerHTML += `
                        <tr class="post-row border-b border-white/5">
                            <td class="px-6 py-4 text-white font-medium">${p.title}</td>
                            <td class="px-6 py-4">${tags || '<span class="text-gray-500">—</span>'}</td>
                            <td class="px-6 py-4 text-gray-400">${date}</td>
                            <td class="px-6 py-4 text-right">
                                <button onclick="editPost('${doc.id}')" class="text-indigo-400 hover:text-indigo-300 mr-4"><i data-lucide="edit-2" class="w-4 h-4 inline"></i></button>
                                <button onclick="deletePost('${doc.id}')" class="text-red-400 hover:text-red-300"><i data-lucide="trash-2" class="w-4 h-4 inline"></i></button>
                            </td>
                        </tr>`;
                });
                lucide.createIcons();
            } catch (err) {
                tbody.innerHTML = `<tr><td colspan="4" class="text-center text-red-400 py-8">Error: ${err.message}</td></tr>`;
            }
        }

        // Save Post
        async function savePost() {
            const title = document.getElementById('post-title').value.trim();
            const content = document.getElementById('post-content').value.trim();
            const image = document.getElementById('post-image').value.trim();
            const author = document.getElementById('post-author').value.trim();
            const editId = document.getElementById('edit-post-id').value;
            const msgEl = document.getElementById('form-message');

            if (!title || !content) {
                msgEl.className = 'mt-4 p-3 rounded-xl text-sm text-center bg-red-500/20 text-red-400';
                msgEl.textContent = 'Title and Content are required!';
                msgEl.classList.remove('hidden');
                return;
            }

            const postData = {
                title,
                content,
                tags: currentTags,
                author: author || 'Zubair Ahmed',
                image: image || null,
                updatedAt: firebase.firestore.FieldValue.serverTimestamp()
            };

            try {
                if (editId) {
                    await db.collection('posts').doc(editId).update(postData);
                    showToast('Post updated!', 'bg-green-500');
                } else {
                    postData.createdAt = firebase.firestore.FieldValue.serverTimestamp();
                    await db.collection('posts').add(postData);
                    showToast('Post published!', 'bg-green-500');
                }
                switchTab('posts');
                loadAllPosts();
            } catch (err) {
                msgEl.className = 'mt-4 p-3 rounded-xl text-sm text-center bg-red-500/20 text-red-400';
                msgEl.textContent = err.message;
                msgEl.classList.remove('hidden');
            }
        }

        // Edit Post
        async function editPost(id) {
            try {
                const doc = await db.collection('posts').doc(id).get();
                if (!doc.exists) return;
                const p = doc.data();
                switchTab('new-post');
                document.getElementById('form-title').textContent = 'Edit Post';
                document.getElementById('save-btn-text').textContent = 'Update Post';
                document.getElementById('edit-post-id').value = id;
                document.getElementById('post-title').value = p.title;
                document.getElementById('post-image').value = p.image || '';
                document.getElementById('post-author').value = p.author || 'Zubair Ahmed';
                document.getElementById('post-content').value = p.content;
                currentTags = p.tags || [];
                renderTags();
                lucide.createIcons();
            } catch (err) { console.error(err); }
        }

        // Delete Post
        async function deletePost(id) {
            if (!confirm('Are you sure you want to delete this post?')) return;
            try {
                await db.collection('posts').doc(id).delete();
                showToast('Post deleted!', 'bg-red-500');
                loadPostsTable();
                loadAllPosts();
            } catch (err) { console.error(err); }
        }

        // Reset Form
        function resetForm() {
            document.getElementById('form-title').textContent = 'New Post';
            document.getElementById('save-btn-text').textContent = 'Publish Post';
            document.getElementById('edit-post-id').value = '';
            document.getElementById('post-title').value = '';
            document.getElementById('post-image').value = '';
            document.getElementById('post-author').value = 'Zubair Ahmed';
            document.getElementById('post-content').value = '';
            document.getElementById('form-message').classList.add('hidden');
            currentTags = [];
            renderTags();
        }

        // Toast
        function showToast(msg, bgClass) {
            const toast = document.createElement('div');
            toast.className = `toast ${bgClass}`;
            toast.textContent = msg;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }
    </script>
</body>
</html>
